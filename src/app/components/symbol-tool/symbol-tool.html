<div class="max-w-6xl mx-auto p-4 md:p-8 text-slate-800 w-full">
  <div class="mb-8 text-center sm:text-left">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Character & Emoji Symbols</h1>
    <p class="text-slate-600">Click any symbol or emoji below to copy it to your clipboard instantly for your dev works.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    @for (category of categories; track category.name) {
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-100 pb-2">
          {{ category.name }}
        </h2>
        
        <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-4 lg:grid-cols-5 gap-3">
          @for (sym of category.symbols; track sym) {
            <button
              (click)="copyToClipboard(sym)"
              class="relative flex items-center justify-center h-12 w-full text-2xl rounded-xl bg-slate-50 border border-slate-100 hover:bg-indigo-50 hover:border-indigo-200 transition-all active:scale-95 group focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
              title="Copy {{ sym }}"
            >
              {{ sym }}
              @if (copiedSymbol() === sym) {
                <span class="absolute -top-10 scale-100 px-2 py-1 text-xs font-bold text-white bg-slate-800 rounded shadow-lg animate-fade-in-up flex items-center gap-1 z-10 whitespace-nowrap">
                  <svg class="w-3 h-3 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                  Copied
                  <!-- Triangle indicator -->
                  <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-t-[4px] border-t-slate-800"></span>
                </span>
              }
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
