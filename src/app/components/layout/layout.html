<div class="min-h-screen bg-slate-50 flex flex-col pt-16">
  <!-- Fixed Top Navigation -->
  <nav class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 z-50 flex items-center px-4 md:px-6 shadow-sm">
    <div class="flex items-center gap-2 mr-8">
      <a routerLink="/" class="text-xl font-bold bg-clip-text text-transparent bg-linear-to-r from-indigo-600 to-violet-600 hover:opacity-80 transition-opacity">
        {{ config.appName }}
      </a>
    </div>

    <div class="flex items-center gap-1 sm:gap-2">
      <a routerLink="/request" routerLinkActive="bg-indigo-50 text-indigo-700"
        class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
        API Calling
      </a>
      <a routerLink="/crypto" routerLinkActive="bg-violet-50 text-violet-700" 
        class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
        Crypto Tool
      </a>
      <a routerLink="/jwt" routerLinkActive="bg-rose-50 text-rose-700" 
        class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
        JWT Tool
      </a>
      <a routerLink="/symbols" routerLinkActive="bg-amber-50 text-amber-700" 
        class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors">
        Symbols
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="grow flex flex-col p-6">
    <router-outlet></router-outlet>
  </main>

  <footer class="border-t border-slate-200/80 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex w-full max-w-7xl flex-col gap-4 px-6 py-5 sm:flex-row sm:items-center sm:justify-between">
      <div class="space-y-1">
        <div class="flex items-center gap-2 text-sm font-semibold text-slate-900">
          <span class="inline-flex h-2.5 w-2.5 rounded-full bg-linear-to-r from-indigo-500 to-violet-500 shadow-sm"></span>
          {{ config.appName }}
        </div>
        <p class="text-sm leading-6 text-slate-500">
          Tools for API requests, crypto, JWT, and symbols in one focused workspace.
        </p>
      </div>

      <div class="flex flex-wrap items-center gap-2 text-xs font-medium text-slate-500">
        <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5">vibrant workspace</span>
        <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5">built for speed</span>
        <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5">{{ currentYear }}</span>
      </div>
    </div>
  </footer>
</div>
